spring.application.name=learningVocabularyPlatform

spring.datasource.url=jdbc:mysql://localhost:3306/vocabulary_learning_platform
spring.datasource.username=${MYSQL_USER:root}
# Access denied: đặt MYSQL_PASSWORD khớp mật khẩu MySQL trên máy bạn (Run Configuration / export trong terminal)
spring.datasource.password=${MYSQL_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=220MB

app.storage.root=./uploads
app.storage.max-file-size-bytes=10485760
app.storage.max-files-per-request=20

